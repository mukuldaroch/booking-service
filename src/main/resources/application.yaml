server:
  port: 8085
  name: "booking-service"
spring:
  #
  application:
    name: booking-service
  #
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5435/bookingdb
    username: postgres
    password: daroch
  #
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  #
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://auth.local:8080/realms/event-service
